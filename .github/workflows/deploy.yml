name: Multi-Platform Full Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # 1. Create the Release Draft first
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Release ${{ github.event.inputs.release_tag }}
          draft: true
          body: |
            ## Comprehensive Web & Mobile Release
            This release contains packages for:
            - Mobile (Android, iOS via EAS Cloud Build)
            - Web (Static Bundle)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build Web and Mobile (AOS/IOS)
  build-web-mobile:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Export Web
        run: npx expo export --platform web && zip -r web-build.zip dist

      - name: Upload Web Artifact
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: web-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger EAS Build (Mobile)
        run: |
          # EAS builds run in the cloud.
          eas build --platform all --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # 3. Build Desktop (Windows, macOS, Linux)
  build-desktop:
    needs: create-release
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      - name: Build and Release Desktop
        run: npm run build:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder specific token
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
